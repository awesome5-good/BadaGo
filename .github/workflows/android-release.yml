name: Android APK & AAB Release

on:
  push:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See repository docs / workflow comments."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
          ls -la android/release.keystore
          echo "keystore file → $(pwd)/android/release.keystore"
          echo "keyAlias=${ANDROID_KEY_ALIAS}"
          echo "signing → Gradle injected params (-Pandroid.injected.signing.*)"

      - name: Build signed release APK
        run: |
          chmod +x android/gradlew
          android/gradlew -p android assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/android/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
          test -f app/build/outputs/bundle/release/app-release.aab

      - name: Sign AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Prepare release assets
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "BadaGo-${{ github.run_number }}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "BadaGo-${{ github.run_number }}.aab"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: BadaGo #${{ github.run_number }}
          body: |
            자동 빌드 APK + AAB (release, 고정 키 서명)
            - Run: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          files: |
            BadaGo-${{ github.run_number }}.apk
            BadaGo-${{ github.run_number }}.aab
          make_latest: true
