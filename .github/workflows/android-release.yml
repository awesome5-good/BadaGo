name: Android APK Release

on:
  push:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See repository docs / workflow comments."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
          {
            echo "storeFile=../../android/release.keystore"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > keystore.properties
          ls -la android/release.keystore keystore.properties
          echo "--- keystore.properties contents (passwords masked) ---"
          sed '/[Pp]assword=/s/=.*/=***/' keystore.properties

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Verify release APK signature
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          echo "APK: $APK"
          unzip -l "$APK" | head -5
          if jarsigner -verify -verbose -certs "$APK" 2>&1 | tee /tmp/jarsigner.log | grep -q "jar verified"; then
            echo "✓ jarsigner: release APK is signed"
          else
            echo "::error::APK is not signed (expected release keystore from ANDROID_KEYSTORE_BASE64)"
            cat /tmp/jarsigner.log
            exit 1
          fi
          if jarsigner -verify -verbose -certs "$APK" 2>&1 | grep -qi "CN=Android Debug"; then
            echo "::error::APK signed with debug key — release signing did not apply"
            exit 1
          fi
          echo "✓ not signed with Android Debug certificate"

      - name: Prepare release asset
        run: cp android/app/build/outputs/apk/release/app-release.apk "BadaGo-${{ github.run_number }}.apk"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: BadaGo APK #${{ github.run_number }}
          body: |
            자동 빌드 APK (release, 고정 키 서명)
            - Run: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          files: BadaGo-${{ github.run_number }}.apk
          make_latest: true
